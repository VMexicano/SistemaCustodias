services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: custodias_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: custodias_user
      POSTGRES_PASSWORD: custodias_pass
      POSTGRES_DB: custodias_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U custodias_user -d custodias_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - custodias_network

  redis:
    image: redis:7-alpine
    container_name: custodias_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - custodias_network

  bull-board:
    image: deadly0/bull-board:latest
    container_name: custodias_bull_board
    ports:
      - "3001:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - custodias_network

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: custodias_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - custodias_network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: custodias_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - custodias_network

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: custodias_jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - custodias_network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  custodias_network:
    driver: bridge
