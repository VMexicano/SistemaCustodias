global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ridebase-api'
    static_configs:
      # host.docker.internal works on Docker Desktop (macOS/Windows).
      # On Linux, use the host-gateway extra_host in docker-compose.yml or set
      # PROMETHEUS_API_TARGET env var to override (e.g. 172.17.0.1:3333).
      - targets: ['${PROMETHEUS_API_TARGET:-host.docker.internal:3333}']
    metrics_path: '/metrics'
